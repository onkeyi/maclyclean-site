<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Downloading Macly…</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column;
           align-items: center; justify-content: center; min-height: 100vh; margin: 0;
           background: #f5f5f9; color: #111827; }
    p { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    small { color: #6b7280; }
  </style>
</head>
<body>
  <p>⬇ Downloading Macly.dmg…</p>
  <small>If it doesn't start automatically, <a id="fallback" href="/Macly.dmg">click here</a>.</small>
  <script>
    fetch('/Macly.dmg')
      .then(function(r) { return r.blob(); })
      .then(function(blob) {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Macly.dmg';
        document.body.appendChild(a);
        a.click();
        setTimeout(function() { window.location.href = '/'; }, 2000);
      })
      .catch(function() {
        document.getElementById('fallback').click();
      });
  </script>
</body>
</html>
